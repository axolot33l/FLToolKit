name: Build and Release FL ToolKit

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required so git can push tags

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload Debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FL-ToolKit-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: FL-ToolKit-release-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      # Create and push a git tag — required by softprops/action-gh-release
      - name: Create and push git tag
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="v${{ github.run_number }}"
          git tag "$TAG"
          git push origin "$TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ github.run_number }}
          name: "FL ToolKit Build ${{ github.run_number }}"
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          body: |
            ## FL ToolKit — Automated Build ${{ github.run_number }}

            **Package:** `com.ninjakiwi.bloonspuzzle`
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`

            > ⚠️ The release APK is **unsigned**. Sign it with your keystore before distributing.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
